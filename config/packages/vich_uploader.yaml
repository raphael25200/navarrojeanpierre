vich_uploader:
    db_driver: orm

    mappings:
        tableaux:
            uri_prefix: /images/images_sources
            upload_destination: '%kernel.project_dir%/public/images/images_sources'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
            inject_on_load: true
            delete_on_update: true
            delete_on_remove: true
